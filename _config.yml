title: "Erick Tucto | Desarrollador Full Stack Laravel y Vue"
description: "Desarrollador full stack con 10 años en PHP, Laravel, Symfony, Vue y Docker. Construyo APIs, aplicaciones web escalables y despliegues en Linux. Disponible para proyectos remotos desde Perú."

author: Erick Tucto
email: "erick@ericktucto.com"
linkedin: "https://www.linkedin.com/in/ericktucto"
tiktok: "https://www.tiktok.com/@erickenelcodigo"
github: "https://github.com/ericktucto"
youtube: "https://www.youtube.com/@ericktucto"
permalink: /blog/:year-:month-:day-:title
url: "https://ericktucto.com"
baseurl: ""
repository: ericktucto/ericktucto.github.io
collections:
    projects:
        output: true
        permalink: /projects/:slug
markdown: kramdown
plugins:
    - jekyll-feed
    - jekyll-sitemap
    - jekyll-paginate-v2
exclude:
    - _scripts
    - vendor/
    - bundle/
    - .git/
    - node_modules/
    - Gemfile
    - Gemfile.lock
    - package.json
    - package-lock.json

keep_files:
  - assets/js
  - assets/css
pagination:
  enabled: true
  per_page: 6
  permalink: '/page/:num/'   # /page/2/, /page/3/...
  sort_field: 'date'
  sort_reverse: true
